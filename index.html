<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aithenor — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy: #0A1628;
  --navy-mid: #0F1F3D;
  --navy-light: #1B3A6B;
  --gold: #B8973A;
  --gold-light: #D4AC52;
  --white: #FFFFFF;
  --gray: #8A8A85;
  --red: #C0392B;
  --red-light: #FDECEA;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--navy);
  color: var(--white);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Background grid */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(184,151,58,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(184,151,58,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
}

/* Radial glow */
body::after {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(184,151,58,0.06) 0%, transparent 65%);
  pointer-events: none;
}

.login-container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Logo */
.logo {
  text-align: center;
  margin-bottom: 40px;
}

.logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--white);
}

.logo-sub {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
  margin-top: 4px;
}

/* Card */
.login-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 44px 40px;
  backdrop-filter: blur(10px);
}

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 6px;
  line-height: 1.1;
}

.card-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 32px;
  line-height: 1.5;
}

/* Form */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.form-label {
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  font-weight: 500;
}

.form-input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--white);
  font-size: 14px;
  font-family: 'Outfit', sans-serif;
  padding: 13px 16px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}

.form-input::placeholder { color: rgba(255,255,255,0.2); }
.form-input:focus { border-color: rgba(184,151,58,0.6); background: rgba(255,255,255,0.07); }

/* Error */
.error-box {
  background: var(--red-light);
  border: 1px solid var(--red);
  color: var(--red);
  font-size: 13px;
  padding: 12px 16px;
  border-radius: 4px;
  margin-bottom: 16px;
  display: none;
  line-height: 1.4;
}

/* Success */
.success-box {
  background: rgba(26,107,60,0.15);
  border: 1px solid rgba(26,107,60,0.4);
  color: #4CAF80;
  font-size: 13px;
  padding: 12px 16px;
  border-radius: 4px;
  margin-bottom: 16px;
  display: none;
  line-height: 1.4;
}

/* Submit */
.submit-btn {
  width: 100%;
  background: var(--gold);
  color: var(--navy);
  font-size: 13px;
  font-weight: 700;
  padding: 14px;
  border: none;
  border-radius: 4px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-family: 'Outfit', sans-serif;
  transition: background 0.2s, transform 0.1s;
  margin-top: 8px;
  cursor: pointer;
}

.submit-btn:hover { background: var(--gold-light); }
.submit-btn:active { transform: scale(0.99); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0;
}

.divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
.divider-text { font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }

/* Links */
.card-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: rgba(255,255,255,0.25);
}

.card-footer a {
  color: var(--gold);
  text-decoration: none;
  transition: color 0.2s;
}

.card-footer a:hover { color: var(--gold-light); }

/* Back link */
.back-link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 28px;
  font-size: 12px;
  color: rgba(255,255,255,0.2);
  text-decoration: none;
  transition: color 0.2s;
}

.back-link:hover { color: rgba(255,255,255,0.5); }

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(10,22,40,0.3);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <div class="logo-text">Aithenor</div>
    <div class="logo-sub">Strategic Intelligence</div>
  </div>

  <div class="login-card">
    <h2 class="card-title">Welcome back</h2>
    <p class="card-sub">Sign in to access your hotel's diagnostic dashboard.</p>

    <div class="error-box" id="error-box"></div>
    <div class="success-box" id="success-box"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="you@yourhotel.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="submit-btn" type="submit" id="submit-btn">Sign In</button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">OR</div>
      <div class="divider-line"></div>
    </div>

    <form id="reset-form" onsubmit="handleReset(event)" style="display:none">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="reset-email" placeholder="you@yourhotel.com" required>
      </div>
      <button class="submit-btn" type="submit" id="reset-btn" style="background: rgba(255,255,255,0.08); color: var(--white);">Send Reset Link</button>
    </form>

    <div class="card-footer">
      <span id="toggle-text">Forgot your password? <a href="#" onclick="toggleReset(event)">Reset it</a></span>
    </div>
  </div>

  <a href="https://www.aithenor.com" class="back-link">← Back to aithenor.com</a>
</div>

<script>
const SUPABASE_URL = 'https://fpnlzpfkygsyvkettjuj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwbmx6cGZreWdzeXZrZXR0anVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDM1NzIsImV4cCI6MjA4ODg3OTU3Mn0.VsfqeclitY91kpn-qS2NBg94BJA99YMgtrmlC9Wz8ns';
const EXTRANET_URL = 'https://aithenor-extranet.vercel.app';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
supabaseClient.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = EXTRANET_URL;
});

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  btn.innerHTML = '<span class="spinner"></span>Signing in...';
  btn.disabled = true;
  hideMessages();

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    showError(getFriendlyError(error.message));
    btn.innerHTML = 'Sign In';
    btn.disabled = false;
    return;
  }

  btn.innerHTML = '✓ Redirecting...';
  // Pass access token to extranet via URL so cross-domain session works
  const token = data.session.access_token;
  const refresh = data.session.refresh_token;
  window.location.href = EXTRANET_URL + '?access_token=' + token + '&refresh_token=' + refresh;
}

async function handleReset(e) {
  e.preventDefault();
  const btn = document.getElementById('reset-btn');
  const email = document.getElementById('reset-email').value;

  btn.textContent = 'Sending...';
  btn.disabled = true;
  hideMessages();

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: EXTRANET_URL
  });

  if (error) {
    showError(getFriendlyError(error.message));
  } else {
    showSuccess('Password reset link sent. Check your email inbox.');
  }

  btn.textContent = 'Send Reset Link';
  btn.disabled = false;
}

function toggleReset(e) {
  e.preventDefault();
  const loginForm = document.getElementById('login-form');
  const resetForm = document.getElementById('reset-form');
  const toggleText = document.getElementById('toggle-text');
  const cardSub = document.querySelector('.card-sub');
  const cardTitle = document.querySelector('.card-title');
  hideMessages();

  if (resetForm.style.display === 'none') {
    loginForm.style.display = 'none';
    resetForm.style.display = 'block';
    cardTitle.textContent = 'Reset password';
    cardSub.textContent = 'Enter your email and we\'ll send you a reset link.';
    toggleText.innerHTML = 'Remember your password? <a href="#" onclick="toggleReset(event)">Sign in</a>';
  } else {
    loginForm.style.display = 'block';
    resetForm.style.display = 'none';
    cardTitle.textContent = 'Welcome back';
    cardSub.textContent = 'Sign in to access your hotel\'s diagnostic dashboard.';
    toggleText.innerHTML = 'Forgot your password? <a href="#" onclick="toggleReset(event)">Reset it</a>';
  }
}

function getFriendlyError(msg) {
  if (msg.includes('Invalid login')) return 'Incorrect email or password. Please try again.';
  if (msg.includes('Email not confirmed')) return 'Please confirm your email address first. Check your inbox for a verification link.';
  if (msg.includes('Too many requests')) return 'Too many attempts. Please wait a few minutes and try again.';
  return msg;
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
}

function showSuccess(msg) {
  const el = document.getElementById('success-box');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideMessages() {
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('success-box').style.display = 'none';
}
</script>
</body>
</html>
